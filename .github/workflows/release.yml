name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            artifact_suffix: linux
          - os: macos-latest
            platform: darwin
            artifact_suffix: macos
          - os: windows-latest
            platform: win32
            artifact_suffix: windows
      fail-fast: false

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm build

      - name: Build platform artifacts
        run: node scripts/build_platform.js ${{ matrix.platform }}

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: whisp-release-${{ matrix.artifact_suffix }}
          path: dist/
          retention-days: 7

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Display artifacts
        run: ls -laR artifacts/

      - name: Compute version
        id: vars
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Whisp v${{ steps.vars.outputs.VERSION }}"
          tag_name: ${{ github.ref_name }}
          body: |
            ## Whisp v${{ steps.vars.outputs.VERSION }}

            ### Download

            **Chrome Extension**
            - [Whisp-Extension-linux.zip](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/Whisp-Extension-linux.zip)
            - [Whisp-Extension-macos.zip](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/Whisp-Extension-macos.zip)
            - [Whisp-Extension-windows.zip](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/Whisp-Extension-windows.zip)

            **Linux**
            - [Whisp.deb](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/Whisp.deb)
            - [Whisp.rpm](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/Whisp.rpm)
            - [Whisp.AppImage](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/Whisp.AppImage)

            **macOS**
            - [Whisp.dmg](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/Whisp.dmg)
            - [Whisp.app](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/Whisp.app.zip)

            **Windows**
            - [Whisp-Setup.exe](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/Whisp-Setup.exe)
            - [Whisp.msi](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/Whisp.msi)

            > **Note:** Linux DEB, RPM, AppImage, macOS DMG, and Windows EXE/MSI installers require building the full Chromium browser from source. See [Building from Source](https://github.com/${{ github.repository }}/blob/main/chromium/contributing.md).
          files: |
            artifacts/*
          draft: true
          prerelease: false
